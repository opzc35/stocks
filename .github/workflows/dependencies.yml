name: Dependency Updates

on:
  schedule:
    # 每周一早上运行
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Check and Update Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check Python dependencies
      run: |
        cd python-engine
        pip install pip-audit
        pip-audit -r requirements.txt || echo "Security issues found"

    - name: Check npm dependencies
      run: |
        npm audit --audit-level=moderate || echo "Security issues found"

    - name: Create issue if vulnerabilities found
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🔒 Security: Dependency vulnerabilities detected',
            body: 'Automated dependency check found security vulnerabilities. Please review and update dependencies.',
            labels: ['security', 'dependencies']
          })
