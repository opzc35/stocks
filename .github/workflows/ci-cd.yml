name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

# 允许并发运行，但取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Python后端测试
  test-python:
    name: Test Python Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'python-engine/requirements.txt'

    - name: Install dependencies
      run: |
        cd python-engine
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        cd python-engine
        # 只检查严重错误，跳过复杂度检查以加快速度
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest
      run: |
        pip install pytest pytest-asyncio
        cd python-engine
        # 如果有测试文件就运行
        if [ -d "tests" ]; then pytest; fi

  # 前端构建测试
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit

    - name: Type check
      run: npx tsc --noEmit

    - name: Build frontend
      run: npm run build

  # Rust构建测试（跳过，因为没有 src-tauri）
  test-rust:
    name: Test Rust/Tauri
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
    - uses: actions/checkout@v4

    - name: Check if Tauri exists
      id: check-tauri
      run: |
        if [ -d "src-tauri" ] && [ -f "src-tauri/Cargo.toml" ]; then
          echo "has_tauri=true" >> $GITHUB_OUTPUT
        else
          echo "has_tauri=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Rust
      if: steps.check-tauri.outputs.has_tauri == 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      if: steps.check-tauri.outputs.has_tauri == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

    - name: Install system dependencies
      if: steps.check-tauri.outputs.has_tauri == 'true'
      run: |
        sudo apt-get update
        # Ubuntu 24.04+ uses libwebkit2gtk-4.1-dev instead of 4.0
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf || \
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Check Rust code
      if: steps.check-tauri.outputs.has_tauri == 'true'
      run: |
        cd src-tauri
        cargo check
        cargo clippy -- -D warnings || echo "Clippy warnings found"

    - name: Run Rust tests
      if: steps.check-tauri.outputs.has_tauri == 'true'
      run: |
        cd src-tauri
        cargo test

    - name: Skip Rust tests
      if: steps.check-tauri.outputs.has_tauri == 'false'
      run: echo "Skipping Rust tests - no src-tauri directory found"

  # Docker镜像构建（仅主分支，且仅测试构建）
  build-docker:
    name: Build Docker Image
    needs: [test-python, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Check for Docker credentials
      id: check-docker
      run: |
        if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo "has_credentials=true" >> $GITHUB_OUTPUT
        else
          echo "has_credentials=false" >> $GITHUB_OUTPUT
        fi

    - name: Log in to Docker Hub
      if: steps.check-docker.outputs.has_credentials == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image (no push)
      if: steps.check-docker.outputs.has_credentials == 'false'
      uses: docker/build-push-action@v5
      with:
        context: ./python-engine
        push: false
        tags: stocks-trading:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Docker image
      if: steps.check-docker.outputs.has_credentials == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./python-engine
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/stocks-trading:latest
          ${{ secrets.DOCKER_USERNAME }}/stocks-trading:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker build summary
      run: |
        if [ "${{ steps.check-docker.outputs.has_credentials }}" == "true" ]; then
          echo "✅ Docker image built and pushed to Docker Hub"
        else
          echo "⚠️ Docker image built locally (no credentials configured)"
          echo "To enable Docker Hub push, add DOCKER_USERNAME and DOCKER_PASSWORD secrets"
        fi


    - name: Check for Docker credentials
      id: check-docker
      run: |
        if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo "has_credentials=true" >> $GITHUB_OUTPUT
        else
          echo "has_credentials=false" >> $GITHUB_OUTPUT
        fi

    - name: Log in to Docker Hub
      if: steps.check-docker.outputs.has_credentials == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image (no push)
      if: steps.check-docker.outputs.has_credentials == 'false'
      uses: docker/build-push-action@v5
      with:
        context: ./python-engine
        push: false
        tags: stocks-trading:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Docker image
      if: steps.check-docker.outputs.has_credentials == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./python-engine
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/stocks-trading:latest
          ${{ secrets.DOCKER_USERNAME }}/stocks-trading:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker build summary
      run: |
        if [ "${{ steps.check-docker.outputs.has_credentials }}" == "true" ]; then
          echo "✅ Docker image built and pushed to Docker Hub"
        else
          echo "⚠️ Docker image built locally (no credentials configured)"
          echo "To enable Docker Hub push, add DOCKER_USERNAME and DOCKER_PASSWORD secrets"
        fi
